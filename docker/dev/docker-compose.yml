services:
  devbox:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
      args:
        USERNAME: dev
        USER_UID: 1000
        USER_GID: 1000
    container_name: devbox
    tty: true
    stdin_open: true
    working_dir: /home/dev/workspace
    environment:
      TERM: xterm-256color
    volumes:
      - dev-home:/home/dev
      - ~/.claude:/home/dev/.claude
      - ~/.codex:/home/dev/.codex
      - ~/.config/gh:/home/dev/.config/gh
    command: /bin/bash

volumes:
  dev-home:
