services:
  devbox:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    container_name: devbox
    tty: true
    stdin_open: true
    working_dir: /home/node/workspace
    environment:
      CODEX_HOME: /home/node/.codex
      TERM: xterm-256color
    volumes:
      - node-home:/home/node
      - ~/.config/gh:/home/node/.config/gh
    command: /bin/bash

volumes:
  node-home:
